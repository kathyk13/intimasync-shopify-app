# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "IntimaSync"
client_id = "7889733f0e223e976809e260ebe040fd"
application_url = "https://intimasync-backend.onrender.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_orders,write_orders,read_inventory,write_inventory"

[auth]
redirect_urls = [
  "https://intimasync-backend.onrender.com/auth/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

  # GDPR mandatory webhooks (required for Shopify App Store)
  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks/gdpr/customers-data-request"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks/gdpr/customers-redact"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks/gdpr/shop-redact"

[app_proxy]
# Privacy policy accessible without Shopify auth
url = "https://intimasync-backend.onrender.com/privacy"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = "426b6d-7c.myshopify.com"
